<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Brynier — Offline</title>
    <meta name="theme-color" content="#4f46e5" />
    <style>
      body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:#0b1020;color:#eef2ff;display:flex;min-height:100vh;align-items:center;justify-content:center;padding:24px}
      .card{max-width:520px;width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:20px}
      h1{margin:0 0 8px;font-size:18px}
      p{margin:0;color:rgba(238,242,255,.75);line-height:1.4}
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You’re offline</h1>
      <p>Brynier can’t reach the network right now. Reconnect and refresh to continue.</p>
    </div>
  </body>
</html>
